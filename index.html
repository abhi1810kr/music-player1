<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="player">
            <nav>
                <div class="circle">
                    <i class="fa-solid fa-heart"></i>
                </div>
                <h3>Now Playing</h3>
                <div class="circle">
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </nav>
            <div class="song-img">
                <img src="images/songLogo.jpg" alt="img">
                <h3>Song Name</h3>
                <p>Singer Name</p>
                <audio src="musics/music-1.mp3" id="song">
                    <source type="audio/mp3">
                </audio>
                <input type="range" class="slider" value="0" id="progressBar">
            </div>
            <div class="control">
                <div class="circle">
                    <i class="fa-solid fa-backward" id="backBtn"></i>
                </div>
                <div class="circle" id="play-pause">
                    <i class="fa-solid fa-play" id="action"></i>
                </div>
                <div class="circle">
                    <i class="fa-solid fa-forward" id="nextBtn"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
